<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Users - XREZZKY TOP UP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
    <link rel="stylesheet" href="../assets/css/animation.css" />
    <style>
        .admin-sidebar {
            background: #0b1a33;
            min-height: 100vh;
            padding: 24px;
            color: #cbd5e1;
            position: sticky;
            top: 0;
        }
        .admin-sidebar .logo {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 32px;
            display: block;
        }
        .admin-sidebar a {
            display: block;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 4px;
            transition: 0.2s;
        }
        .admin-sidebar a:hover,
        .admin-sidebar a.active {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }
        .admin-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 0;
            min-height: 100vh;
        }
        .admin-content {
            padding: 32px;
            background: #f8faff;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        @media (max-width: 768px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }
            .admin-sidebar {
                min-height: auto;
                position: relative;
            }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <div class="admin-sidebar">
            <a href="index.html" class="logo">XREZZKY ADMIN</a>
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="games.html">🎮 Games</a>
            <a href="products.html">📦 Products</a>
            <a href="users.html" class="active">👤 Users</a>
            <a href="transactions.html">📋 Transactions</a>
            <a href="payments.html">💳 Payments</a>
            <a href="promos.html">🎁 Promos</a>
            <a href="banners.html">🖼️ Banners</a>
            <a href="settings.html">⚙️ Settings</a>
            <a href="logs.html">📝 Logs</a>
            <a href="../index.html" style="margin-top:32px; border-top:1px solid #1e2f4a; padding-top:16px;">← Back to Site</a>
        </div>
        <div class="admin-content">
            <div class="admin-header">
                <div>
                    <h1>Users</h1>
                    <p style="color:#64748b;">Kelola data pengguna</p>
                </div>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>Email</th>
                            <th>Username</th>
                            <th>Tanggal Daftar</th>
                            <th>Role</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="adminUsersBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script type="module">
        import { supabase } from '../../supabase/config.js'
        document.addEventListener('DOMContentLoaded', async () => {
            const { data } = await supabase.from('users').select('*').order('created_at', { ascending: false })
            const tbody = document.getElementById('adminUsersBody')
            if (data) {
                tbody.innerHTML = data.map(u => `
                    <tr>
                        <td><strong>${u.full_name || u.username}</strong></td>
                        <td>${u.email}</td>
                        <td>${u.username}</td>
                        <td>${new Date(u.created_at).toLocaleDateString('id-ID')}</td>
                        <td><span class="status-badge ${u.role === 'admin' ? 'success' : 'pending'}">${u.role || 'user'}</span></td>
                        <td>
                            <div class="admin-actions">
                                <button class="btn-sm btn-outline" onclick="alert('Edit user')">Edit</button>
                                <button class="btn-sm btn-danger" onclick="if(confirm('Hapus user?')){alert('Dihapus')}">Hapus</button>
                            </div>
                        </td>
                    </tr>
                `).join('')
            }
        })
    </script>
</body>
</html>
