<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lupa Password - XREZZKY TOP UP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/animation.css" />
</head>
<body>
    <nav>
        <div class="container nav-wrapper">
            <a href="index.html" class="logo">XREZZKY <span>TOP UP</span></a>
            <div class="nav-actions">
                <a href="login.html" class="btn-outline btn-sm">Masuk</a>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="container auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Lupa Password</h2>
                    <p>Masukkan email untuk reset password</p>
                </div>
                <form id="forgotForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Masukkan email" required />
                    </div>
                    <button type="submit" class="btn-primary btn-full">Kirim Link Reset</button>
                    <p class="auth-footer"><a href="login.html">Kembali ke Login</a></p>
                </form>
            </div>
        </div>
    </section>

    <footer style="margin-top: 0; border-radius: 0;">
        <div class="container copyright">© 2025 XREZZKY TOP UP. All rights reserved.</div>
    </footer>

    <script src="env.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
